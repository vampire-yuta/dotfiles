# Set the prefix to ^T.
#unbind Cb
set-option -g prefix C-t
bind-key t send-prefix
#bind-key C-t last-window-

# 新規のWindowやPainをカレントディレクトリで開く
bind c new-window -c '#{pane_current_path}'

set-window-option -g mode-keys vi

# コピーした際にWindowsのクリップボードにも転送する (yum install -y xsel)
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"

# #H => マシン名
# #P => ペイン番号
# 最左に表示
set-option -g status-left '#H:[#P]'

# ステータスバーを１秒毎に描画し直す
set-option -g status-interval 1

# ステータスバーを2行にする
set-option -g status 2

# 1行目: ホスト名・ウィンドウリスト
set-option -g status-format[0] '#[align=left]#{W:#{E:window-status-format},#{E:window-status-current-format}}'

# 2行目: システム情報
set-option -g status-format[1] '#[align=right]#(ip route get 8.8.8.8 &>/dev/null && echo "NET:✓" || echo "NET:✗") ↓#(~/.tmux/plugins/tmux-net-speed/scripts/download_speed.sh) ↑#(~/.tmux/plugins/tmux-net-speed/scripts/upload_speed.sh) | CPU:#(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) RAM:#(~/.tmux/plugins/tmux-cpu/scripts/ram_percentage.sh) | #(~/.tmux/plugins/tmux-battery/scripts/battery_icon.sh) #(~/.tmux/plugins/tmux-battery/scripts/battery_percentage.sh) | [%Y-%m-%d(%a) %H:%M:%S]'

#PCのステータスバーの追加
set-option -g status-right-length 150
set-option -g status-right ''

#256 color terminal
set -g default-terminal "tmux-256color"
set -g mouse on

# Escapeキーの遅延を除去
# nvim内でEscを押したときの反応が遅くなる問題を解消する
set -sg escape-time 0

# フォーカスイベントを有効化
# tmux内のnvimがウィンドウのフォーカス取得/喪失を検知できるようになる
# nvimのgitgutterの自動更新やauto-saveが正確に動作するようになる
set -g focus-events on

# ウィンドウ・ペイン番号を1始まりにする
# キーボード上で0は遠いため1始まりの方が操作しやすい
set -g base-index 1
set -g pane-base-index 1

# ウィンドウを閉じたとき番号を自動的に詰める
# 例: ウィンドウ1,2,3で2を閉じると1,2に自動で振り直される
set -g renumber-windows on

# ステータスメッセージの表示時間 (ミリ秒)
# prefix + r でリロードしたときなどのメッセージをしっかり確認できる
set -g display-time 2000

# 設定ファイルをリロードする
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# | でペインを縦に分割する
bind | split-window -h

# - でペインを横に分割する
bind - split-window -v

# vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+


bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# Windowの戻る進むのキーバインド
bind B previous-window
bind N next-window
bind L choose-window

# Split window with pane current path
bind %   split-window -hc "#{pane_current_path}"
bind '"' split-window -vc "#{pane_current_path}"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-logging'  # prefix + shift + pでログ取得
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-net-speed'
set -g @net_speed_interfaces "wlp0s20f3"
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmuxサーバー起動時に最後に保存したセッションを自動リストアする
# リストアせずに起動したい場合は `tmux new-session` で新規セッションを作成する
# （自動リストアはサーバー起動時のみ走るため、サーバーが起動中なら new-session は新規セッションになる）
set -g @continuum-restore 'on'

# セッション復元時にペインの内容（出力テキスト）も復元する
# tmux-resurrect と組み合わせて使用 (prefix + Ctrl-s で保存、prefix + Ctrl-r で復元)
set -g @resurrect-capture-pane-contents 'on'

# バッファ行数
set -g history-limit 100000

set-option -g default-shell "/usr/bin/fish"

# 一括でペインを閉じる
bind C-q kill-session

# 非アクティブな窓ガラス
set -g window-style 'fg=default,bg=default'

# アクティブな窓ガラス
set -g window-active-style 'fg=default,bg=default'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
